<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - EcoTrack</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container login-container">
        <div class="card">
            <header>
                <h2>Login</h2>
            </header>
            <div th:if="${param.error}" class="alert error">Invalid username or password.</div>
            <div th:if="${param.logout}" class="alert success">You have been logged out.</div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required/>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required/>
                </div>
                <div class="form-group">
                    <input type="submit" value="Sign In" style="width: 100%"/>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
