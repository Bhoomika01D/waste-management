<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Dashboard</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Welcome, User!</h1>
            <p>Manage your waste pickups efficiently.</p>
        </header>
        
        <div th:if="${message}" class="alert success" th:text="${message}"></div>

        <div class="card">
            <h2>Schedule Waste Pickup</h2>
            <p>Ready for a pickup? Click the button below to notify our team.</p>
            <form action="/pickup" method="post">
                <button type="submit" class="btn primary">Schedule Pickup Now</button>
            </form>
        </div>

        <form th:action="@{/logout}" method="post" style="text-align: center; margin-top: 2rem;">
            <button type="submit" class="btn secondary">Logout</button>
        </form>
    </div>
</body>
</html>
